<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>문서 뷰어</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard','Noto Sans KR',sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh}

/* 잠금 화면 */
.lock-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0a0a0f 0%,#1a1a2e 100%)}
.lock-box{background:#16162a;border:1px solid #2a2a4a;border-radius:16px;padding:40px;text-align:center;width:320px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.lock-box h2{color:#7C6FE0;margin-bottom:20px;font-size:18px}
.lock-box input{width:100%;padding:12px 16px;border:1px solid #333;border-radius:8px;background:#0f0f1a;color:#fff;font-size:16px;text-align:center;letter-spacing:4px;outline:none}
.lock-box input:focus{border-color:#7C6FE0}
.lock-box .err{color:#ef5350;font-size:12px;margin-top:8px;min-height:18px}
.lock-box .info{color:#4caf50;font-size:12px;margin-top:4px;min-height:18px}
.lock-box button{margin-top:16px;padding:10px 32px;background:#7C6FE0;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer}

/* 차단 */
.blocked{display:none;align-items:center;justify-content:center;min-height:100vh;background:#0a0a0f}
.blocked-box{background:#1a1020;border:1px solid #4a2040;border-radius:16px;padding:40px;text-align:center;width:320px}
.blocked-box h2{color:#ef5350;margin-bottom:12px;font-size:18px}
.blocked-box p{color:#888;font-size:13px}

/* 메인 */
.app{display:none}
.header{background:#16162a;border-bottom:1px solid #2a2a4a;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:16px;color:#7C6FE0}
.header-right{display:flex;gap:8px;align-items:center}
.header .btn{font-size:12px;color:#666;cursor:pointer;padding:6px 12px;border:1px solid #333;border-radius:6px}
.header .btn:hover{border-color:#7C6FE0;color:#7C6FE0}
.header .btn.danger:hover{border-color:#ef5350;color:#ef5350}
.header .btn.active{border-color:#4caf50;color:#4caf50}
.ip-info{font-size:10px;color:#444;margin-right:8px}

/* 탭 */
.tabs{display:flex;gap:0;background:#12122a;border-bottom:1px solid #2a2a4a;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:10px 16px;font-size:13px;color:#888;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
.tab.active{color:#7C6FE0;border-bottom-color:#7C6FE0;background:#1a1a35}

/* 콘텐츠 */
.content{padding:20px;max-width:900px;margin:0 auto}
.doc{white-space:pre-wrap;font-family:'D2Coding','Consolas',monospace;font-size:13px;line-height:1.7;color:#d0d0d0;background:#12122a;border:1px solid #2a2a4a;border-radius:12px;padding:24px;overflow-x:auto}
.doc .h1{font-size:18px;color:#7C6FE0;font-weight:700;margin:16px 0 8px}
.doc .h2{font-size:15px;color:#9C8FFF;font-weight:600;margin:12px 0 6px}
.doc .h3{font-size:14px;color:#B0A0FF;font-weight:500;margin:8px 0 4px}
.doc .bold{color:#fff;font-weight:600}
.doc .code{background:#1e1e3a;padding:12px;border-radius:8px;border:1px solid #333;margin:8px 0}
.doc .table-wrap{overflow-x:auto;margin:8px 0}
.doc table{border-collapse:collapse;width:100%;font-size:12px}
.doc th{background:#1e1e3a;color:#7C6FE0;padding:8px 10px;text-align:left;border:1px solid #333}
.doc td{padding:8px 10px;border:1px solid #2a2a4a}
.doc .highlight{background:#7C6FE020;border-left:3px solid #7C6FE0;padding:8px 12px;margin:8px 0}

.updated{font-size:11px;color:#555;text-align:right;margin-bottom:8px}
.loading{text-align:center;padding:60px;color:#555}

/* 편집 모드 */
.edit-bar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:8px}
.edit-bar button{padding:6px 16px;border:none;border-radius:6px;font-size:12px;cursor:pointer}
.edit-bar .edit-btn{background:#2a2a4a;color:#7C6FE0;border:1px solid #7C6FE0}
.edit-bar .save-btn{background:#4caf50;color:#fff;display:none}
.edit-bar .cancel-btn{background:#333;color:#aaa;display:none}
.doc-edit{display:none;width:100%;min-height:400px;font-family:'D2Coding','Consolas',monospace;font-size:13px;line-height:1.7;color:#d0d0d0;background:#12122a;border:1px solid #7C6FE0;border-radius:12px;padding:24px;resize:vertical;outline:none}
.save-msg{font-size:11px;color:#4caf50;margin-left:8px;opacity:0;transition:opacity .3s}
.tab.memo{color:#ffb74d}
.tab.memo.active{color:#ffb74d;border-bottom-color:#ffb74d;background:#1a1810}
.memo-hint{font-size:11px;color:#ffb74d;background:#1a1810;border:1px solid #4a3a1a;border-radius:8px;padding:10px 14px;margin-bottom:12px;line-height:1.6}

/* 증거 카드 */
.ev-card{background:#16162a;border:1px solid #2a2a4a;border-radius:10px;padding:12px 14px;margin:8px 0}
.ev-card.card-deny{border-left:3px solid #ef5350}
.ev-card.card-ok{border-left:3px solid #4caf50}
.card-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.card-num{background:#2a2a4a;color:#7C6FE0;font-weight:700;font-size:12px;padding:2px 8px;border-radius:4px;min-width:24px;text-align:center}
.card-name{color:#e0e0e0;font-size:13px;flex:1}
.card-opinion{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px}
.card-deny .card-opinion{background:#4a1a1a;color:#ef5350}
.card-ok .card-opinion{background:#1a3a1a;color:#4caf50}
.card-reason{color:#999;font-size:12px;line-height:1.5;margin-top:6px;padding-top:6px;border-top:1px solid #2a2a4a}

/* 임시개방 모달 */
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#16162a;border:1px solid #2a2a4a;border-radius:12px;padding:24px;width:280px;text-align:center}
.modal h3{color:#7C6FE0;margin-bottom:12px;font-size:15px}
.modal p{color:#888;font-size:12px;margin-bottom:16px}
.modal button{padding:8px 20px;border:none;border-radius:6px;font-size:13px;cursor:pointer;margin:0 4px}
.modal .confirm{background:#4caf50;color:#fff}
.modal .cancel{background:#333;color:#aaa}

/* 모바일 */
@media (max-width:600px){
  .header{padding:8px 12px}
  .header h1{font-size:14px}
  .tabs{gap:0}
  .tab{padding:8px 10px;font-size:12px}
  .content{padding:10px}
  .doc{font-size:12px;line-height:1.6;padding:14px;border-radius:8px;word-break:keep-all}
  .doc .h1{font-size:16px}
  .doc .h2{font-size:14px}
  .doc .h3{font-size:13px}
  .doc table{font-size:11px}
  .doc th,.doc td{padding:5px 6px}
  .doc-edit{font-size:12px;padding:14px;min-height:300px}
  .edit-bar{gap:6px}
  .edit-bar button{padding:8px 14px;font-size:12px}
  .memo-hint{font-size:10px;padding:8px 10px}
  .lock-box{width:280px;padding:28px}
  .blocked-box{width:280px;padding:28px}
}

/* 인쇄 */
@media print{
  .header,.tabs,.logout{display:none!important}
  body{background:#fff;color:#000}
  .doc{background:#fff;border:none;color:#000}
}
</style>
</head>
<body>

<!-- 차단 화면 -->
<div class="blocked" id="blockedScreen">
  <div class="blocked-box">
    <h2>접근 제한</h2>
    <p>등록되지 않은 환경입니다.</p>
    <p id="blockedIp" style="color:#555;font-size:11px;margin-top:12px"></p>
  </div>
</div>

<!-- 잠금 화면 -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-box">
    <h2>접근 코드 입력</h2>
    <input type="password" id="passInput" maxlength="20" placeholder="••••" autofocus>
    <div class="err" id="passErr"></div>
    <div class="info" id="passInfo"></div>
    <button onclick="tryUnlock()">확인</button>
  </div>
</div>

<!-- 메인 앱 -->
<div class="app" id="app">
  <div class="header">
    <h1>사건 문서</h1>
    <div class="header-right">
      <span class="ip-info" id="ipDisplay"></span>
      <span class="btn danger" onclick="doLock()">잠금</span>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="content" id="content">
    <div class="loading">불러오는 중...</div>
  </div>
</div>

<!-- 임시개방 모달 -->
<div class="modal-bg" id="tempModal">
  <div class="modal">
    <h3>임시 개방</h3>
    <p>30분간 새 환경에서<br>접근코드로 등록 가능</p>
    <button class="confirm" onclick="enableTempOpen()">개방</button>
    <button class="cancel" onclick="closeTempModal()">취소</button>
  </div>
</div>

<script>
const FB='https://poskds-4ba60-default-rtdb.asia-southeast1.firebasedatabase.app';
let myIp='';
let docs={};
let currentTab='';

// IP 가져오기
async function getMyIp(){
  try{
    const r=await fetch('https://api.ipify.org?format=json');
    const d=await r.json();
    return d.ip;
  }catch(e){
    try{
      const r2=await fetch('https://httpbin.org/ip');
      const d2=await r2.json();
      return d2.origin;
    }catch(e2){return null;}
  }
}

// IP 체크 → 허용 여부 판단
async function checkIpAccess(){
  myIp=await getMyIp();
  if(!myIp){
    // IP 확인 실패시 접근코드만으로 진행
    showLockScreen();
    return;
  }

  // Firebase에서 허용 IP 목록 + 임시개방 상태 확인
  const [ipsRes,tempRes]=await Promise.all([
    fetch(FB+'/packhelper/legal/allowed_ips.json').then(r=>r.json()).catch(()=>null),
    fetch(FB+'/packhelper/legal/temp_open.json').then(r=>r.json()).catch(()=>null)
  ]);

  const allowedIps=ipsRes||{};
  const ipList=Object.values(allowedIps);

  // IP가 허용 목록에 있으면 통과
  if(ipList.includes(myIp)){
    showLockScreen();
    return;
  }

  // 임시개방 중이면 통과 (접근코드 입력 시 IP 자동 등록)
  if(tempRes&&tempRes.until){
    const until=new Date(tempRes.until).getTime();
    if(Date.now()<until){
      showLockScreen(true); // 임시개방 모드로 잠금화면
      return;
    }
  }

  // 허용 목록도 없고 임시개방도 아닌데, 아직 아무도 등록 안 한 경우
  if(ipList.length===0){
    showLockScreen(true); // 최초 등록 허용
    return;
  }

  // 차단
  document.getElementById('blockedScreen').style.display='flex';
  document.getElementById('lockScreen').style.display='none';
  document.getElementById('blockedIp').textContent=myIp;
}

function showLockScreen(isNewDevice){
  document.getElementById('lockScreen').style.display='flex';
  document.getElementById('blockedScreen').style.display='none';
  if(isNewDevice){
    document.getElementById('passInfo').textContent='새 환경 — 코드 입력 시 자동 등록';
  }
}

function tryUnlock(){
  const v=document.getElementById('passInput').value;
  if(!v){document.getElementById('passErr').textContent='코드를 입력하세요';return;}
  fetch(FB+'/packhelper/legal/access_code.json').then(r=>r.json()).then(code=>{
    if(v===code){
      sessionStorage.setItem('legal_auth','1');
      // IP 등록
      if(myIp){registerIp(myIp);}
      document.getElementById('lockScreen').style.display='none';
      document.getElementById('app').style.display='block';
      if(myIp){document.getElementById('ipDisplay').textContent=myIp;}
      loadDocs();
    } else {
      document.getElementById('passErr').textContent='코드가 틀렸습니다';
      document.getElementById('passInput').value='';
    }
  }).catch(()=>{
    document.getElementById('passErr').textContent='서버 연결 실패';
  });
}

function registerIp(ip){
  const safe=ip.replace(/\./g,'_');
  fetch(FB+'/packhelper/legal/allowed_ips/'+safe+'.json',{
    method:'PUT',
    body:JSON.stringify(ip)
  }).catch(()=>{});
}

document.getElementById('passInput').addEventListener('keydown',e=>{
  if(e.key==='Enter')tryUnlock();
});

function doLock(){
  sessionStorage.removeItem('legal_auth');
  document.getElementById('app').style.display='none';
  document.getElementById('lockScreen').style.display='flex';
  document.getElementById('passInput').value='';
  document.getElementById('passErr').textContent='';
  document.getElementById('passInfo').textContent='';
}

// 임시개방
function showTempModal(){document.getElementById('tempModal').classList.add('show');}
function closeTempModal(){document.getElementById('tempModal').classList.remove('show');}
function enableTempOpen(){
  const until=new Date(Date.now()+30*60*1000).toISOString();
  fetch(FB+'/packhelper/legal/temp_open.json',{
    method:'PUT',
    body:JSON.stringify({until:until,by:myIp})
  }).then(()=>{
    closeTempModal();
    const btn=document.getElementById('tempBtn');
    btn.textContent='개방중 (30분)';
    btn.classList.add('active');
    setTimeout(()=>{btn.textContent='임시개방';btn.classList.remove('active');},30*60*1000);
  });
}

// 임시개방 상태 표시
async function checkTempStatus(){
  try{
    const r=await fetch(FB+'/packhelper/legal/temp_open.json');
    const d=await r.json();
    if(d&&d.until&&new Date(d.until).getTime()>Date.now()){
      const btn=document.getElementById('tempBtn');
      const left=Math.round((new Date(d.until).getTime()-Date.now())/60000);
      btn.textContent='개방중 ('+left+'분)';
      btn.classList.add('active');
    }
  }catch(e){}
}

function loadDocs(){
  fetch(FB+'/packhelper/legal/docs.json').then(r=>r.json()).then(data=>{
    if(!data){document.getElementById('content').innerHTML='<div class="loading">문서 없음</div>';return;}
    docs=data;
    renderTabs();
    const keys=Object.keys(docs).sort();
    if(keys.length)selectTab(keys[0]);
  });
  checkTempStatus();
}

function renderTabs(){
  const keys=Object.keys(docs).sort();
  const labels={
    '개선_01_증거의견서':'증거의견서',
    '개선_02_의견서_변론요지서':'의견서',
    '개선_03_증거신청서':'증거신청서',
    '개선_04_모두진술문':'모두진술',
    '종합분석_개선판':'종합분석',
    '검토_쟁점정리':'쟁점정리',
    '기존_사건분석_전략':'기존분석',
    'memo_claude':'메모',
    'schedule_trial':'재판일정'
  };
  const memoKeys=['memo_claude','schedule_trial'];
  document.getElementById('tabs').innerHTML=keys.map(k=>{
    const isMemo=memoKeys.includes(k);
    return `<div class="tab${k===currentTab?' active':''}${isMemo?' memo':''}" onclick="selectTab('${k}')">${labels[k]||k}</div>`;
  }).join('');
}

function selectTab(k){
  currentTab=k;
  renderTabs();
  const d=docs[k];
  if(!d){document.getElementById('content').innerHTML='';return;}
  const updated=d.updated?`<div class="updated">업데이트: ${d.updated}</div>`:'';
  const rendered=renderMarkdown(d.content||'');
  const editBar=`<div class="edit-bar">
    <span class="save-msg" id="saveMsg"></span>
    <button class="cancel-btn" id="cancelBtn" onclick="cancelEdit()">취소</button>
    <button class="save-btn" id="saveBtn" onclick="saveDoc()">저장</button>
    <button class="edit-btn" id="editBtn" onclick="startEdit()">편집</button>
  </div>`;
  const memoHint=currentTab==='memo_claude'?
    '<div class="memo-hint">사실관계 수정, 추가 정보, 클로드에게 할 말을 자유롭게 적어주세요.<br>기존 내용 아래에 이어서 작성 가능. 저장 후 "확인해줘" 하면 반영합니다.<br>처리된 건 [처리완료]로 표시됩니다.</div>':'';
  document.getElementById('content').innerHTML=updated+memoHint+editBar+
    '<div class="doc" id="docView">'+rendered+'</div>'+
    '<textarea class="doc-edit" id="docEdit"></textarea>';
}

function renderMarkdown(text){
  // 박스 문자 테이블 → 카드형 변환 (먼저 처리)
  text=parseBoxTable(text);
  let html=escapeHtml(text);
  html=html.replace(/^### (.+)$/gm,'<div class="h3">$1</div>');
  html=html.replace(/^## (.+)$/gm,'<div class="h2">$1</div>');
  html=html.replace(/^# (.+)$/gm,'<div class="h1">$1</div>');
  html=html.replace(/\*\*(.+?)\*\*/g,'<span class="bold">$1</span>');
  html=html.replace(/```([\s\S]*?)```/g,'<div class="code">$1</div>');
  html=html.replace(/`([^`]+)`/g,'<code style="background:#1e1e3a;padding:2px 6px;border-radius:4px">$1</code>');
  // 마크다운 | 테이블
  html=html.replace(/((?:\|.+\|\n?)+)/g,function(m){
    const rows=m.trim().split('\n').filter(r=>r.trim());
    if(rows.length<2)return m;
    let t='<div class="table-wrap"><table>';
    rows.forEach((row,i)=>{
      if(row.match(/^\|[\s\-:|]+\|$/))return;
      const cells=row.split('|').filter(c=>c.trim()!=='');
      const tag=i===0?'th':'td';
      t+='<tr>'+cells.map(c=>`<${tag}>${c.trim()}</${tag}>`).join('')+'</tr>';
    });
    t+='</table></div>';
    return t;
  });
  // [CARD:...] 플레이스홀더 복원
  html=html.replace(/\[CARD:(\d+):(\w+):(.*?):([\s\S]*?)\]/g,function(_,num,opinion,name,reason){
    const cls=opinion==='부동의'?'card-deny':'card-ok';
    const reasonHtml=reason.trim()?'<div class="card-reason">'+reason.trim()+'</div>':'';
    return '<div class="ev-card '+cls+'"><div class="card-head"><span class="card-num">'+num+'</span><span class="card-name">'+name.trim()+'</span><span class="card-opinion">'+opinion+'</span></div>'+reasonHtml+'</div>';
  });
  html=html.replace(/^&gt; (.+)$/gm,'<div class="highlight">$1</div>');
  html=html.replace(/^---$/gm,'<hr style="border:none;border-top:1px solid #2a2a4a;margin:16px 0">');
  return html;
}

function parseBoxTable(text){
  const lines=text.split('\n');
  const hasBox=lines.some(l=>/[┌┬┐├┼┤└┴┘│─]/.test(l));
  if(!hasBox)return text;
  let result=[];
  let inTable=false;
  let cells=[];
  let currentCell=[];
  let cellMeta={num:'',name:'',opinion:''};
  for(let i=0;i<lines.length;i++){
    const l=lines[i];
    if(/^[┌├└╔╠╚]/.test(l)||/^[\s]*[┌├└]/.test(l)){
      // 구분선: 이전 셀 저장
      if(currentCell.length&&cellMeta.num){
        const reason=currentCell.join('\n').trim();
        result.push('[CARD:'+cellMeta.num+':'+cellMeta.opinion+':'+cellMeta.name+':'+reason+']');
        currentCell=[];cellMeta={num:'',name:'',opinion:''};
      }
      inTable=true;
      continue;
    }
    if(inTable&&/│/.test(l)){
      const parts=l.split('│').map(s=>s.trim()).filter(s=>s!=='');
      if(parts.length>=3&&/^\d+$/.test(parts[0])){
        // 새 행 시작
        if(currentCell.length&&cellMeta.num){
          const reason=currentCell.join('\n').trim();
          result.push('[CARD:'+cellMeta.num+':'+cellMeta.opinion+':'+cellMeta.name+':'+reason+']');
          currentCell=[];
        }
        cellMeta.num=parts[0];
        cellMeta.name=parts[1];
        cellMeta.opinion=parts[2];
        if(parts[3])currentCell.push(parts[3]);
      } else if(parts.length>=1&&cellMeta.num){
        // 부동의 사유 연속 행
        const reason=parts[parts.length-1]||parts[0]||'';
        if(reason&&reason!==cellMeta.opinion&&reason!==cellMeta.name)currentCell.push(reason);
      }
      continue;
    }
    if(inTable&&!/│/.test(l)&&!/[┌┬┐├┼┤└┴┘]/.test(l)){
      // 테이블 끝
      if(currentCell.length&&cellMeta.num){
        const reason=currentCell.join('\n').trim();
        result.push('[CARD:'+cellMeta.num+':'+cellMeta.opinion+':'+cellMeta.name+':'+reason+']');
        currentCell=[];cellMeta={num:'',name:'',opinion:''};
      }
      inTable=false;
    }
    if(!inTable)result.push(l);
  }
  if(currentCell.length&&cellMeta.num){
    const reason=currentCell.join('\n').trim();
    result.push('[CARD:'+cellMeta.num+':'+cellMeta.opinion+':'+cellMeta.name+':'+reason+']');
  }
  return result.join('\n');
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 편집 기능
function startEdit(){
  const d=docs[currentTab];
  if(!d)return;
  document.getElementById('docView').style.display='none';
  document.getElementById('docEdit').style.display='block';
  document.getElementById('docEdit').value=d.content||'';
  document.getElementById('editBtn').style.display='none';
  document.getElementById('saveBtn').style.display='inline-block';
  document.getElementById('cancelBtn').style.display='inline-block';
  document.getElementById('docEdit').focus();
}

function cancelEdit(){
  document.getElementById('docView').style.display='block';
  document.getElementById('docEdit').style.display='none';
  document.getElementById('editBtn').style.display='inline-block';
  document.getElementById('saveBtn').style.display='none';
  document.getElementById('cancelBtn').style.display='none';
}

function saveDoc(){
  const content=document.getElementById('docEdit').value;
  const now=new Date().toLocaleString('ko-KR',{timeZone:'Asia/Seoul',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).replace(/\. /g,'-').replace('.','');
  const safeKey=encodeURIComponent(currentTab);
  fetch(FB+'/packhelper/legal/docs/'+safeKey+'.json',{
    method:'PUT',
    body:JSON.stringify({content:content,updated:now})
  }).then(r=>r.json()).then(()=>{
    docs[currentTab]={content:content,updated:now};
    // 렌더링 업데이트
    document.getElementById('docView').innerHTML=renderMarkdown(content);
    cancelEdit();
    const msg=document.getElementById('saveMsg');
    msg.textContent='저장 완료';
    msg.style.opacity='1';
    setTimeout(()=>{msg.style.opacity='0';},2000);
  }).catch(()=>{
    alert('저장 실패');
  });
}

// 시작
if(sessionStorage.getItem('legal_auth')==='1'){
  // 이미 인증된 세션 — IP 체크 후 진행
  (async()=>{
    myIp=await getMyIp();
    if(myIp){
      const ipsRes=await fetch(FB+'/packhelper/legal/allowed_ips.json').then(r=>r.json()).catch(()=>({}));
      const ipList=Object.values(ipsRes||{});
      if(ipList.length>0&&!ipList.includes(myIp)){
        sessionStorage.removeItem('legal_auth');
        document.getElementById('blockedScreen').style.display='flex';
        document.getElementById('lockScreen').style.display='none';
        document.getElementById('blockedIp').textContent=myIp;
        return;
      }
      document.getElementById('ipDisplay').textContent=myIp;
    }
    document.getElementById('lockScreen').style.display='none';
    document.getElementById('app').style.display='block';
    loadDocs();
  })();
} else {
  checkIpAccess();
}
</script>
